<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mecca – Dashboard</title>
<style>
/* ── Reset & Base ──────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f0e8;
  --card:rgba(255,255,252,.92);
  --card-solid:#fffef9;
  --text:#3a3530;
  --text-light:#8a7e6f;
  --green:#5ba872;
  --green-light:#e2f3e8;
  --green-hover:#49915e;
  --sepia:#c9b896;
  --sepia-light:#e8dcc8;
  --sepia-dark:#a89370;
  --border:rgba(180,165,140,.35);
  --shadow:0 2px 12px rgba(60,50,30,.08);
  --radius:14px;
}
html{font-size:15px}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  color:var(--text);
  min-height:100vh;
  line-height:1.5;
  background:var(--bg);
  position:relative;
}

/* ── Topographic Map Background – full bleed ───── */
body::before{
  content:'';
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  z-index:0;
  background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Spezialkarte_4757_Wien.jpg/1280px-Spezialkarte_4757_Wien.jpg');
  background-size:120% 120%;
  background-position:center;
  background-repeat:no-repeat;
  filter:sepia(.35) saturate(.5) brightness(1.15);
  opacity:.12;
  pointer-events:none;
}
body>*{position:relative;z-index:1}

/* ── Header ────────────────────────────────────── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  background:rgba(255,255,252,.7);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.header-left{display:flex;align-items:center;gap:18px}

/* ── mecca Branding ────────────────────────────── */
.brand{
  font-size:1.5rem;
  font-weight:300;
  letter-spacing:.4em;
  color:var(--green);
  padding-right:.4em;
  position:relative;
}
.brand::after{
  content:'';
  position:absolute;bottom:-2px;left:0;right:.4em;
  height:2px;
  background:linear-gradient(90deg,var(--green),var(--sepia),transparent);
  border-radius:1px;
}

.clock{font-size:.85rem;color:var(--text-light);font-variant-numeric:tabular-nums}
.clock-date{margin-left:8px;font-weight:500;color:var(--text)}

/* ── Hero Bar (Search + KI) ────────────────────── */
.hero{
  display:flex;align-items:center;justify-content:center;
  gap:14px;
  padding:28px 32px 24px;
  flex-wrap:wrap;
}

/* ── Search ────────────────────────────────────── */
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,252,.85);
  backdrop-filter:blur(10px);
  border:1px solid var(--border);
  border-radius:28px;padding:10px 20px;
  width:360px;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:0 2px 10px rgba(60,50,30,.06);
}
.search-bar:focus-within{border-color:var(--green);box-shadow:0 0 0 3px rgba(91,168,114,.15)}
.search-bar input{
  flex:1;border:none;background:transparent;
  font-size:.95rem;color:var(--text);outline:none;
}
.search-bar button{
  background:none;border:none;cursor:pointer;
  font-size:1.1rem;color:var(--text-light);
  transition:color .2s;
}
.search-bar button:hover{color:var(--green)}

/* ── KI Buttons (modern/flashy) ────────────────── */
.ki-btn{
  display:flex;align-items:center;gap:12px;
  padding:12px 28px;
  border:none;
  border-radius:16px;
  cursor:pointer;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  text-decoration:none;
  font-size:1rem;font-weight:600;
  min-width:170px;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.ki-btn::before{
  content:'';position:absolute;inset:0;
  opacity:0;transition:opacity .3s;
  border-radius:16px;
}
.ki-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(0,0,0,.15);
}
.ki-btn:hover::before{opacity:1}
.ki-btn img{width:24px;height:24px;border-radius:6px;position:relative;z-index:1}
.ki-btn span{position:relative;z-index:1}

.ki-btn.chatgpt{background:var(--card);border:2px solid #10a37f;color:#10a37f}
.ki-btn.chatgpt::before{background:rgba(16,163,127,.06)}
.ki-btn.gemini{background:var(--card);border:2px solid #4285f4;color:#4285f4}
.ki-btn.gemini::before{background:rgba(66,133,244,.06)}

/* ── Main Layout ───────────────────────────────── */
.main{
  max-width:1280px;margin:0 auto;
  padding:0 32px 20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* ── Card / Section ────────────────────────────── */
.card{
  background:var(--card);
  backdrop-filter:blur(8px);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:box-shadow .2s;
}
.card:hover{box-shadow:0 4px 20px rgba(60,50,30,.1)}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;
  border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;
}
.card-head h2{
  font-size:.92rem;font-weight:600;
  display:flex;align-items:center;gap:8px;
  color:var(--green);
}
.chevron{transition:transform .25s;font-size:.7rem;color:var(--text-light)}
.card.closed .chevron{transform:rotate(-90deg)}
.card.closed .card-body{display:none}
.card-body{padding:14px 18px}

/* ── Link Grid ─────────────────────────────────── */
.link-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(125px,1fr));
  gap:8px;
}
.link-item{
  display:flex;align-items:center;gap:8px;
  padding:9px 11px;border-radius:8px;
  text-decoration:none;color:var(--text);
  font-size:.85rem;font-weight:500;
  transition:all .15s;
  border:1px solid transparent;
}
.link-item:hover{
  background:var(--green-light);
  border-color:var(--green);color:var(--green);
}
.link-icon{
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;border-radius:5px;overflow:hidden;
}
.link-icon img{width:20px;height:20px;border-radius:3px;display:block}
.link-icon svg{width:20px;height:20px;display:block}
/* fallback colored badge */
.link-icon .fallback{
  display:none;width:22px;height:22px;
  background:var(--green);border-radius:5px;
  color:#fff;font-size:.65rem;font-weight:700;
  align-items:center;justify-content:center;line-height:1;
}

/* ── Weather Widget ─────────────────────────────── */
.weather-section{
  max-width:1280px;margin:0 auto;
  padding:0 32px 18px;
}
.weather-card{
  background:var(--card);
  backdrop-filter:blur(8px);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px 24px;
  display:flex;align-items:center;gap:20px;
  flex-wrap:wrap;
}
.weather-main{
  display:flex;align-items:center;gap:14px;
}
.weather-icon{font-size:2.4rem;line-height:1}
.weather-temp{font-size:2rem;font-weight:300;color:var(--text)}
.weather-temp small{font-size:.9rem;color:var(--text-light);font-weight:400}
.weather-details{
  display:flex;gap:20px;flex:1;flex-wrap:wrap;
}
.weather-detail{
  font-size:.8rem;color:var(--text-light);
  display:flex;flex-direction:column;gap:2px;
}
.weather-detail strong{color:var(--text);font-weight:600;font-size:.85rem}
.weather-location{
  font-size:.82rem;color:var(--green);font-weight:600;
  display:flex;align-items:center;gap:5px;
}
.weather-forecast{
  display:flex;gap:12px;margin-left:auto;
}
.forecast-day{
  text-align:center;font-size:.72rem;color:var(--text-light);
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.forecast-day .fc-icon{font-size:1.2rem}
.forecast-day .fc-temp{font-weight:600;color:var(--text);font-size:.78rem}

/* ── Zitat-Banner (thematic) ───────────────────── */
.quote-banner{
  max-width:1280px;margin:0 auto;
  padding:0 32px 10px;
}
.quote-card{
  background:linear-gradient(135deg,rgba(91,168,114,.08),rgba(201,184,150,.12));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px 32px;
  display:flex;align-items:center;gap:24px;
  backdrop-filter:blur(6px);
}
.quote-icon{
  font-size:2.2rem;flex-shrink:0;
  opacity:.7;filter:grayscale(.3);
}
.quote-text{flex:1}
.quote-text blockquote{
  font-size:.92rem;font-style:italic;
  color:var(--text);line-height:1.6;
  margin-bottom:4px;
}
.quote-text cite{
  font-size:.75rem;color:var(--text-light);
  font-style:normal;
}
.quote-tip{
  font-size:.72rem;
  color:var(--text-light);
  background:rgba(255,255,252,.6);
  border-radius:8px;
  padding:8px 14px;
  border:1px solid var(--border);
  max-width:200px;
  text-align:center;
  line-height:1.4;
}
.quote-tip strong{color:var(--green);font-weight:600}

/* ── Radio Widget – fixed bottom-right ─────────── */
.radio-widget{
  position:fixed;bottom:20px;right:20px;z-index:100;width:280px;
}
.radio-toggle-btn{
  display:flex;align-items:center;gap:8px;
  padding:9px 16px;
  background:var(--card-solid);
  border:1px solid var(--border);border-radius:24px;
  cursor:pointer;font-size:.8rem;font-weight:500;
  color:var(--text);
  box-shadow:0 2px 12px rgba(60,50,30,.12);
  transition:all .2s;margin-left:auto;width:fit-content;
}
.radio-toggle-btn:hover{border-color:var(--green);color:var(--green)}
.radio-toggle-btn .playing-indicator{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);animation:blink 1.5s infinite;display:none;
}
.radio-toggle-btn.is-playing .playing-indicator{display:inline-block}

.radio-panel{
  display:none;background:var(--card-solid);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:0 4px 24px rgba(60,50,30,.15);
  margin-bottom:8px;overflow:hidden;
}
.radio-panel.open{display:block}
.radio-panel-head{
  padding:10px 14px;font-size:.8rem;font-weight:600;color:var(--green);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.radio-panel-head button{
  background:none;border:none;cursor:pointer;
  color:var(--text-light);font-size:.95rem;transition:color .15s;
}
.radio-panel-head button:hover{color:var(--text)}
.radio-panel-body{padding:10px}

.radio-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.radio-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 8px;border-radius:6px;
  border:1px solid var(--border);
  background:var(--card-solid);cursor:pointer;
  font-size:.73rem;font-weight:500;
  transition:all .15s;color:var(--text);
}
.radio-btn:hover{border-color:var(--green);color:var(--green)}
.radio-btn.active{
  background:var(--green-light);border-color:var(--green);
  color:var(--green);font-weight:600;
}
.radio-btn .tag{
  font-size:.58rem;padding:1px 4px;border-radius:3px;
  background:var(--sepia-light);color:var(--text-light);font-weight:600;white-space:nowrap;
}
.radio-btn.active .tag{background:var(--green);color:#fff}

.player-bar{
  margin-top:8px;padding:8px 10px;
  background:rgba(91,168,114,.07);border-radius:7px;
  display:flex;align-items:center;gap:8px;font-size:.73rem;
}
.player-bar button{
  background:none;border:none;cursor:pointer;
  font-size:.85rem;color:var(--text-light);
  transition:color .15s;padding:1px 3px;
}
.player-bar button:hover{color:var(--green)}
.player-now{
  flex:1;overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;color:var(--text-light);
}
.player-now.playing{color:var(--green);font-weight:600}
.playing-dot{
  display:inline-block;width:5px;height:5px;
  border-radius:50%;background:var(--green);
  margin-right:5px;animation:blink 1.5s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.vol-slider{width:55px;height:3px;accent-color:var(--green);cursor:pointer}

/* ── Footer ────────────────────────────────────── */
.footer{
  text-align:center;padding:16px;
  font-size:.7rem;color:var(--text-light);letter-spacing:.05em;
}

/* ── Responsive ────────────────────────────────── */
@media(max-width:820px){
  .main{grid-template-columns:1fr;padding:0 16px 16px}
  .hero{flex-direction:column;gap:12px;padding:20px 16px}
  .search-bar{width:100%}
  .ki-btn{min-width:auto;width:100%}
  .radio-widget{width:260px;bottom:12px;right:12px}
  .quote-card{flex-direction:column;text-align:center}
  .quote-tip{max-width:100%}
}
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────── -->
<header class="header">
  <div class="header-left">
    <div class="brand">mecca</div>
    <div class="clock">
      <span id="clock-time">--:--</span>
      <span class="clock-date" id="clock-date"></span>
    </div>
  </div>
</header>

<!-- ── Hero: Search + KI ───────────────────────── -->
<div class="hero">
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Google-Suche ..."
           onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()" title="Suchen">&#128269;</button>
  </div>
  <a class="ki-btn chatgpt" href="https://chat.openai.com" target="_blank">
    <img src="https://cdn.oaistatic.com/assets/favicon-o.svg"
         alt="ChatGPT" onerror="this.style.display='none'">
    <span>ChatGPT</span>
  </a>
  <a class="ki-btn gemini" href="https://gemini.google.com" target="_blank">
    <img src="https://www.gstatic.com/lamda/images/gemini_favicon_f069958c85030456e93de685481c559f160ea06b.png"
         alt="Gemini" onerror="this.style.display='none'">
    <span>Gemini</span>
  </a>
</div>

<!-- ── Main ────────────────────────────────────── -->
<div class="main">

  <!-- Organisation -->
  <div class="card" id="sec-org">
    <div class="card-head" onclick="toggleCard('sec-org')">
      <h2>&#128193; Organisation</h2>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="card-body">
      <div class="link-grid" id="grid-org"></div>
    </div>
  </div>

  <!-- Research -->
  <div class="card" id="sec-research">
    <div class="card-head" onclick="toggleCard('sec-research')">
      <h2>&#128300; Research &amp; Daten</h2>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="card-body">
      <div class="link-grid" id="grid-research"></div>
    </div>
  </div>

</div>

<!-- ── Weather Widget ──────────────────────────── -->
<div class="weather-section">
  <div class="weather-card">
    <div class="weather-main">
      <div class="weather-icon" id="w-icon">--</div>
      <div>
        <div class="weather-location" id="w-location">&#128205; Wien</div>
        <div class="weather-temp" id="w-temp">--°C</div>
      </div>
    </div>
    <div class="weather-details">
      <div class="weather-detail"><span>Gefühlt</span><strong id="w-feels">--°C</strong></div>
      <div class="weather-detail"><span>Luftfeuchte</span><strong id="w-humid">--%</strong></div>
      <div class="weather-detail"><span>Wind</span><strong id="w-wind">-- km/h</strong></div>
      <div class="weather-detail"><span>Zustand</span><strong id="w-desc">--</strong></div>
    </div>
    <div class="weather-forecast" id="w-forecast"></div>
  </div>
</div>

<!-- ── Thematic Quote Banner ───────────────────── -->
<div class="quote-banner">
  <div class="quote-card">
    <div class="quote-icon">&#127963;</div>
    <div class="quote-text">
      <blockquote id="quote-body"></blockquote>
      <cite id="quote-author"></cite>
    </div>
    <div class="quote-tip">
      <strong>Tipp des Tages</strong><br>
      <span id="tip-text"></span>
    </div>
  </div>
</div>

<div class="footer">mecca &middot; Raumplanung</div>

<!-- ── Radio Widget ────────────────────────────── -->
<div class="radio-widget">
  <div class="radio-panel" id="radio-panel">
    <div class="radio-panel-head">
      Radio
      <button onclick="toggleRadio()" title="Schliessen">&times;</button>
    </div>
    <div class="radio-panel-body">
      <div class="radio-grid" id="radio-grid"></div>
      <div class="player-bar">
        <button onclick="playPrev()" title="Vorheriger">&#9198;</button>
        <button onclick="stopStream()" title="Stopp">&#9209;</button>
        <button onclick="playNext()" title="Nächster">&#9197;</button>
        <span class="player-now" id="player-now">---</span>
        <button id="mute-btn" onclick="toggleMute()" title="Stumm">&#128266;</button>
        <input type="range" class="vol-slider" id="vol" min="0" max="100" value="80"
               oninput="setVolume(this.value)">
      </div>
    </div>
  </div>
  <button class="radio-toggle-btn" id="radio-toggle" onclick="toggleRadio()">
    <span class="playing-indicator"></span>
    &#128251;
    <span id="radio-toggle-label">Radio</span>
  </button>
</div>

<!-- ── JavaScript ──────────────────────────────── -->
<script>
/* ── Helpers ───────────────────────────────────── */
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* Build a link – type: 'img' (favicon URL), 'svg' (symbol id), 'fav' (auto favicon with fallback) */
function linkHTML(url, label, iconType, iconVal){
  if(iconType==='img'){
    return `<a class="link-item" href="${esc(url)}" target="_blank">
      <span class="link-icon"><img src="${esc(iconVal)}" alt=""></span>
      ${esc(label)}
    </a>`;
  }
  if(iconType==='svg'){
    return `<a class="link-item" href="${esc(url)}" target="_blank">
      <span class="link-icon"><svg style="color:var(--green)"><use href="#${esc(iconVal)}"/></svg></span>
      ${esc(label)}
    </a>`;
  }
  /* fallback: auto favicon with letter badge */
  const fav=new URL(url).origin+'/favicon.ico';
  const abbr=iconVal||label.substring(0,2).toUpperCase();
  return `<a class="link-item" href="${esc(url)}" target="_blank">
    <span class="link-icon">
      <img src="${esc(fav)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="fallback">${esc(abbr)}</span>
    </span>
    ${esc(label)}
  </a>`;
}

/* ── Clock ─────────────────────────────────────── */
const DAYS=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const MONTHS=['Jänner','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
function updateClock(){
  const d=new Date();
  document.getElementById('clock-time').textContent=
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clock-date').textContent=
    DAYS[d.getDay()]+', '+d.getDate()+'. '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}
updateClock(); setInterval(updateClock,10000);

/* ── Weather (Open-Meteo API – Wien, no key needed) */
const WMO_ICONS={0:'\u2600\uFE0F',1:'\u{1F324}\uFE0F',2:'\u26C5',3:'\u2601\uFE0F',
  45:'\u{1F32B}\uFE0F',48:'\u{1F32B}\uFE0F',
  51:'\u{1F326}\uFE0F',53:'\u{1F326}\uFE0F',55:'\u{1F327}\uFE0F',
  56:'\u{1F327}\uFE0F',57:'\u{1F327}\uFE0F',
  61:'\u{1F326}\uFE0F',63:'\u{1F327}\uFE0F',65:'\u{1F327}\uFE0F',
  66:'\u{1F327}\uFE0F',67:'\u{1F327}\uFE0F',
  71:'\u{1F328}\uFE0F',73:'\u{1F328}\uFE0F',75:'\u{1F328}\uFE0F',77:'\u{1F328}\uFE0F',
  80:'\u{1F326}\uFE0F',81:'\u{1F327}\uFE0F',82:'\u{1F327}\uFE0F',
  85:'\u{1F328}\uFE0F',86:'\u{1F328}\uFE0F',
  95:'\u26C8\uFE0F',96:'\u26C8\uFE0F',99:'\u26C8\uFE0F'};
const WMO_DESC={0:'Klar',1:'Überwiegend klar',2:'Teilweise bewölkt',3:'Bewölkt',
  45:'Nebel',48:'Reifnebel',51:'Leichter Niesel',53:'Nieselregen',55:'Starker Niesel',
  56:'Gefrierender Niesel',57:'Starker gefr. Niesel',
  61:'Leichter Regen',63:'Regen',65:'Starker Regen',
  66:'Gefrierender Regen',67:'Starker gefr. Regen',
  71:'Leichter Schnee',73:'Schneefall',75:'Starker Schnee',77:'Schneegriesel',
  80:'Leichte Schauer',81:'Schauer',82:'Starke Schauer',
  85:'Schneeschauer',86:'Starke Schneeschauer',
  95:'Gewitter',96:'Gewitter mit Hagel',99:'Starkes Gewitter'};
const SHORT_DAYS=['So','Mo','Di','Mi','Do','Fr','Sa'];

async function loadWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=48.2082&longitude=16.3738&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe%2FVienna&forecast_days=5');
    const d=await r.json();
    const c=d.current;
    document.getElementById('w-icon').textContent=WMO_ICONS[c.weather_code]||'\u2601\uFE0F';
    document.getElementById('w-temp').innerHTML=Math.round(c.temperature_2m)+'°C';
    document.getElementById('w-feels').textContent=Math.round(c.apparent_temperature)+'°C';
    document.getElementById('w-humid').textContent=c.relative_humidity_2m+'%';
    document.getElementById('w-wind').textContent=Math.round(c.wind_speed_10m)+' km/h';
    document.getElementById('w-desc').textContent=WMO_DESC[c.weather_code]||'--';
    /* 5-day forecast */
    const fc=d.daily;
    let html='';
    for(let i=1;i<fc.time.length;i++){
      const dt=new Date(fc.time[i]);
      html+=`<div class="forecast-day">
        <span>${SHORT_DAYS[dt.getDay()]}</span>
        <span class="fc-icon">${WMO_ICONS[fc.weather_code[i]]||'\u2601\uFE0F'}</span>
        <span class="fc-temp">${Math.round(fc.temperature_2m_max[i])}° / ${Math.round(fc.temperature_2m_min[i])}°</span>
      </div>`;
    }
    document.getElementById('w-forecast').innerHTML=html;
  }catch(e){
    document.getElementById('w-desc').textContent='Offline';
  }
}
loadWeather();

/* ── Radio ─────────────────────────────────────── */
function toggleRadio(){document.getElementById('radio-panel').classList.toggle('open')}

const STATIONS=[
  {name:'Groove Salad', tag:'AMBIENT', url:'https://ice1.somafm.com/groovesalad-256-mp3'},
  {name:'Drone Zone',   tag:'DEEP',    url:'https://ice1.somafm.com/dronezone-256-mp3'},
  {name:'Digitalis',    tag:'SYNTH',   url:'https://ice1.somafm.com/digitalis-256-mp3'},
  {name:'Deep Space One',tag:'SPACE',  url:'https://ice1.somafm.com/deepspaceone-128-mp3'},
  {name:'Ö3',           tag:'POP',     url:'https://orf-live.ors-shoutcast.at/oe3-q2a'},
  {name:'Radio Wien',   tag:'WIEN',    url:'https://orf-live.ors-shoutcast.at/wie-q2a'},
  {name:'Ö1',           tag:'KLASSIK', url:'https://orf-live.ors-shoutcast.at/oe1-q2a'},
  {name:'FM4',          tag:'ALT',     url:'https://orf-live.ors-shoutcast.at/fm4-q2a'},
];

let audio=new Audio(), activeIdx=-1, muted=false, lastVol=80;
audio.volume=0.8;

document.getElementById('radio-grid').innerHTML=STATIONS.map((s,i)=>
  `<button class="radio-btn" id="rb${i}" onclick="playIdx(${i})">
     <span class="tag">${s.tag}</span>${s.name}
   </button>`
).join('');

function playIdx(i){
  if(i<0||i>=STATIONS.length) return;
  audio.src=STATIONS[i].url;
  audio.play().catch(()=>{});
  document.querySelectorAll('.radio-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('rb'+i).classList.add('active');
  activeIdx=i; updateNow();
}
function playNext(){playIdx(activeIdx<STATIONS.length-1?activeIdx+1:0)}
function playPrev(){playIdx(activeIdx>0?activeIdx-1:STATIONS.length-1)}
function stopStream(){
  audio.pause();audio.src='';
  document.querySelectorAll('.radio-btn').forEach(b=>b.classList.remove('active'));
  activeIdx=-1;updateNow();
}
function setVolume(v){audio.volume=v/100;lastVol=v;if(muted){muted=false;document.getElementById('mute-btn').textContent='\u{1F50A}';}}
function toggleMute(){
  muted=!muted;audio.volume=muted?0:lastVol/100;
  document.getElementById('mute-btn').textContent=muted?'\u{1F507}':'\u{1F50A}';
}
function updateNow(){
  const el=document.getElementById('player-now');
  const tb=document.getElementById('radio-toggle');
  const lb=document.getElementById('radio-toggle-label');
  if(activeIdx>=0){
    el.innerHTML='<span class="playing-dot"></span>'+STATIONS[activeIdx].name;
    el.classList.add('playing');
    tb.classList.add('is-playing');
    lb.textContent=STATIONS[activeIdx].name;
  } else {
    el.textContent='---';el.classList.remove('playing');
    tb.classList.remove('is-playing');lb.textContent='Radio';
  }
}
